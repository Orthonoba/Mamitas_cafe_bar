<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="45%" stop-color="#2c1810"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <radialGradient id="rose-glow" cx="70%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#e8849a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#e8849a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="green-glow" cx="20%" cy="75%" r="30%">
      <stop offset="0%" stop-color="#4caf7d" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4caf7d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#f5ecd7" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#f5ecd7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#rose-glow)"/>
  <rect width="1920" height="1080" fill="url(#green-glow)"/>
  <rect width="1920" height="1080" fill="url(#center-glow)"/>
  <!-- Decorative dots grid -->
  <pattern id="dots" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
    <circle cx="30" cy="30" r="1" fill="white" fill-opacity="0.04"/>
  </pattern>
  <rect width="1920" height="1080" fill="url(#dots)"/>
  <!-- Decorative circles -->
  <circle cx="1650" cy="180" r="350" fill="none" stroke="#e8849a" stroke-opacity="0.07" stroke-width="1"/>
  <circle cx="1650" cy="180" r="260" fill="none" stroke="#e8849a" stroke-opacity="0.05" stroke-width="1"/>
  <circle cx="300" cy="900" r="280" fill="none" stroke="#4caf7d" stroke-opacity="0.06" stroke-width="1"/>
  <circle cx="300" cy="900" r="200" fill="none" stroke="#4caf7d" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Subtle horizontal lines for depth -->
  <line x1="0" y1="540" x2="1920" y2="540" stroke="white" stroke-opacity="0.02" stroke-width="1"/>
  <line x1="0" y1="360" x2="1920" y2="360" stroke="white" stroke-opacity="0.015" stroke-width="1"/>
  <line x1="0" y1="720" x2="1920" y2="720" stroke="white" stroke-opacity="0.015" stroke-width="1"/>
</svg>
